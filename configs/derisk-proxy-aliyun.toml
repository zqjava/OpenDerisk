[system]
# Load language from environment variable(It is set by the hook)
language = "${env:DERISK_LANG:-zh}"
log_level = "INFO"
api_keys = []
encrypt_key = "${ENCRYPT_KEY:-your_secret_key}"

# Server Configurations
[service.web]
host = "0.0.0.0"
port = 7777
model_storage = "database"
web_url = "https://localhost:${env:WEB_SERVER_PORT:-7777}"

[service.web.database]
type = "sqlite"
path = "pilot/meta_data/derisk.db"

[service.web.trace]
file = "${env:TRACE_FILE_DIR:-logs}/derisk_webserver_tracer.jsonl"

[service.model.worker]
host = "127.0.0.1"

[agent.llm]
# (可选) 全局配置
temperature = 0.5

[[agent.llm.provider]]
provider = "openai"
api_base = "https://dashscope.aliyuncs.com/compatible-mode/v1"
api_key = "${DASHSCOPE_API_KEY_2:-sk-...}"

[[agent.llm.provider.model]]
name = "deepseek-r1"
temperature = 0.7
max_new_tokens = 4096
[[agent.llm.provider.model]]
name = "deepseek-v3"
temperature = 0.7
max_new_tokens = 4096
[[agent.llm.provider.model]]
name = "Kimi-k2"
temperature = 0.7
max_new_tokens = 4096
[[agent.llm.provider.model]]
name = "qwen-plus"
temperature = 0.7
max_new_tokens = 4096
[[agent.llm.provider.model]]
name = "qwen-vl-max"
temperature = 0.7
max_new_tokens = 4096
is_multimodal = true  # 多模态模型，支持图片输入

[[agent.llm.provider.model]]
name = "glm-5"
temperature = 0.7
max_new_tokens = 4096
is_multimodal = true  # 多模态模型，支持图片输入

[[serves]]
type = "file"
# Default backend for file server
default_backend = "oss"

[[serves.backends]]
type = "oss"
endpoint = "https://oss-cn-beijing.aliyuncs.com"
region = "oss-cn-beijing"
access_key_id = "${env:OSS_ACCESS_KEY_ID:-xxx}"
access_key_secret = "${env:OSS_ACCESS_KEY_SECRET:-xxx}"
fixed_bucket = "openderisk"


[sandbox]
type="local"
template_id=""
user_id="derisk"
agent_name="derisk"
repo_url=""
work_dir="/home/ubuntu"
skill_dir="/mnt/derisk/skills"
# OSS configuration deprecated - using unified FileStorageClient from serves.backends
# oss_ak="${env:OSS_ACCESS_KEY_ID:-xxx}"
# oss_sk="${env:OSS_ACCESS_KEY_SECRET:-xxx}"
# oss_endpoint="https://oss-cn-beijing.aliyuncs.com"
# oss_bucket_name="openderisk"

# Disable default skill sync from GitHub (network can be slow)
[derisk.serve.skill]
enable_default_skill_sync = false
